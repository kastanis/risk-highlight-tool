[project]
name = "risk-highlight-tool"
version = "0.1.0"
description = "Risk highlighter for journalism copy, analysis code, and source notes"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    # Notebook environment
    "ipykernel>=7.2.0",
    "ipython>=9.12.0",
    "jupyterlab>=4.5.6",
    "jupytext>=1.19.1",

    # Layer 1 — copy risk (NLP)
    "spacy>=3.8.14",      # NER, dependency parse, Matcher
    # "textacy>=0.13.0",  # SVO extraction, direct quotations — floret fails on Py 3.13, defer to v2

    # Layer 2 — code risk (added when Layer 2 is built)
    # "nbformat"          # stdlib-adjacent, parse .ipynb cells
    # "sqlfluff"          # SQL linting

    # Layer 3 — notes recall (added when Layer 3 is built)
    # "sentence-transformers"   # local embeddings, no external API
    # "chromadb"                # local vector store
    # "pdfplumber"              # PDF text extraction
    # "google-api-python-client" # Google Drive ingestion

    # UI
    "streamlit>=1.45.0",
]
